name: Dynamic Profile Updater

on:
  schedule:
    # Runs every 12 hours to update your snake and feeds
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows you to run it manually
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      # --- SETUP ---
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- FEATURE 1: GENERATE SNAKE GAME ---
      - name: Generate Contribution Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# --- FEATURE 2: LIVE GUESTBOOK INTERACTION ---
      - name: Update Guestbook
        uses: muety/readme-guestbook@v1.0.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_entries: 5
        if: ${{ github.event.issue.title == 'Guestbook' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      # --- FEATURE 3: LIVE GUESTBOOK INTERACTION ---
      - name: Update Guestbook
        uses: mscoutermarsh/github-readme-guestbook@v1.2.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_ENTRIES: 5
          # This ensures it only runs if someone uses your specific guestbook issue
          if: ${{ github.event.issue.title == 'Sign my Guestbook' }} 

      # --- DEPLOYMENT ---
      - name: Deploy Generated Assets to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
